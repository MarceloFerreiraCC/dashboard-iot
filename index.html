<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Dashboard IoT</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <header>

      <h1>🌱 Monitoramento IoT</h1>

      <p>
        Sensor de Umidade do Solo
      </p>

    </header>

    <section class="cards">

      <div class="card">

        <h2>Umidade</h2>

        <div id="umidade">
          0%
        </div>

      </div>

      <div class="card">

        <h2>Status</h2>

        <div id="status">
          Conectando...
        </div>

      </div>

    </section>

    <section class="grafico-container">

      <canvas id="grafico"></canvas>

    </section>

  </div>

  <script src="script.js"></script>

</body>
</html>
